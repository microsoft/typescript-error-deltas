schedules:
  - cron: "0 19 * * Fri" # time is in UTC
    displayName: Friday overnight run
    always: true
    branches:
      include:
        - main

pr: none
trigger: none

pool:
  name: TypeScript-1ES-Large
  demands:
    - ImageOverride -equals azure-linux-3

extends:
  template: azure-pipelines-gitTests-template.yml
  parameters:
    ENTRYPOINT: fuzzer
    OLD_VERSION: '0'
    NEW_VERSION: main
    LANGUAGE: TypeScript
    DIAGNOSTIC_OUTPUT: true
